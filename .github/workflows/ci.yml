name: xixi-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  readme-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enforce README sync for product changes
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "[readme-sync] base=${BASE_SHA}"
          echo "[readme-sync] head=${HEAD_SHA}"
          node scripts/check-readme-sync.mjs "${BASE_SHA}" "${HEAD_SHA}"

  desktop-smoke:
    needs: readme-sync
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Type and frontend build
        run: npm run check; npm run build

      - name: Rust tests
        run: npm run test:rust
